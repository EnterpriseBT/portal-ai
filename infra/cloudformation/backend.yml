AWSTemplateFormatVersion: "2010-09-09"
Description: Portal.ai — ECR + ECS Fargate + ALB

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  Subdomain:
    Type: String
    Default: api-dev
  DomainName:
    Type: String
    Default: portalsai.io
  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
  Cpu:
    Type: Number
    Default: 256
  Memory:
    Type: Number
    Default: 512
  DesiredCount:
    Type: Number
    Default: 1
  ImageTag:
    Type: String
    Default: latest
    Description: Docker image tag to deploy
  BuildVersion:
    Type: String
    Default: dev
    Description: Build version string injected as BUILD_VERSION env var (e.g. dev-abc1234)
  BuildSha:
    Type: String
    Default: local
    Description: Git commit SHA injected as BUILD_SHA env var
  # ── Secrets Manager ARNs (full ARN including random suffix) ─
  # Partial ARNs fail with ResourceNotFoundException at task startup.
  # Retrieve with: aws secretsmanager describe-secret --secret-id portalai/{env}/<name> --query ARN
  SecretArnDatabaseUrl:
    Type: String
    Description: Full ARN of portalai/{env}/database-url secret
  SecretArnEncryptionKey:
    Type: String
    Description: Full ARN of portalai/{env}/encryption-key secret
  SecretArnAuth0WebhookSecret:
    Type: String
    Description: Full ARN of portalai/{env}/auth0-webhook-secret secret
  SecretArnAnthropicApiKey:
    Type: String
    Description: Full ARN of portalai/{env}/anthropic-api-key secret
  SecretArnTavilyApiKey:
    Type: String
    Description: Full ARN of portalai/{env}/tavily-api-key secret

Resources:
  # ── ECR Repository ───────────────────────────────────────
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "portalai-api-${Environment}"
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }
            ]
          }
      Tags:
        - Key: Name
          Value: !Sub "portalai-api-${Environment}"

  # ── S3 Upload Bucket ─────────────────────────────────────
  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "portalai-${Environment}-uploads"
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: !Sub "portalai-${Environment}-uploads"

  # ── ECS Cluster ──────────────────────────────────────────
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "portalai-${Environment}"
      Tags:
        - Key: Name
          Value: !Sub "portalai-${Environment}"

  # ── KMS Key for CloudWatch Log Encryption ────────────────
  LogGroupKmsKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: !Sub "KMS key for portalai-${Environment} CloudWatch log group"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Sid: Allow CloudWatch Logs
            Effect: Allow
            Principal:
              Service: !Sub "logs.${AWS::Region}.amazonaws.com"
            Action:
              - kms:Encrypt*
              - kms:Decrypt*
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:Describe*
            Resource: "*"
            Condition:
              ArnLike:
                kms:EncryptionContext:aws:logs:arn: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/portalai-api-${Environment}"

  LogGroupKmsKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/portalai-${Environment}-logs"
      TargetKeyId: !Ref LogGroupKmsKey

  # ── CloudWatch Log Group ─────────────────────────────────
  LogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub "/ecs/portalai-api-${Environment}"
      RetentionInDays: 30
      KmsKeyId: !GetAtt LogGroupKmsKey.Arn

  # ── IAM — Task Execution Role ────────────────────────────
  # Used by ECS agent to pull images, read secrets, write logs
  TaskExecutionManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "portalai-${Environment}-task-execution-policy"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource:
              - !Ref SecretArnDatabaseUrl
              - !Ref SecretArnEncryptionKey
              - !Ref SecretArnAuth0WebhookSecret
              - !Ref SecretArnAnthropicApiKey
              - !Ref SecretArnTavilyApiKey
              - !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:rds!*"
          - Effect: Allow
            Action:
              - ssm:GetParameters
            Resource:
              - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/portalai/${Environment}/*"

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "portalai-${Environment}-task-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
        - !Ref TaskExecutionManagedPolicy

  # ── IAM — Task Role ──────────────────────────────────────
  # Used by the running container for S3 uploads, etc.
  TaskManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "portalai-${Environment}-task-policy"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
            Resource: !Sub "${UploadBucket.Arn}/*"
          - Effect: Allow
            Action:
              - s3:ListBucket
            Resource: !GetAtt UploadBucket.Arn

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "portalai-${Environment}-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref TaskManagedPolicy

  # ── Security Groups ──────────────────────────────────────
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "portalai-${Environment} ALB"
      VpcId: !ImportValue
        Fn::Sub: "${Environment}-VpcId"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: !Sub "portalai-${Environment}-alb-sg"

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "portalai-${Environment} ECS tasks"
      VpcId: !ImportValue
        Fn::Sub: "${Environment}-VpcId"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3001
          ToPort: 3001
          SourceSecurityGroupId: !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "portalai-${Environment}-ecs-sg"

  # ── ALB ──────────────────────────────────────────────────
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "portalai-${Environment}-alb"
      Scheme: internet-facing
      Type: application
      Subnets:
        - !ImportValue
          Fn::Sub: "${Environment}-PublicSubnet1"
        - !ImportValue
          Fn::Sub: "${Environment}-PublicSubnet2"
      SecurityGroups:
        - !Ref ALBSecurityGroup
      LoadBalancerAttributes:
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: "true"
      Tags:
        - Key: Name
          Value: !Sub "portalai-${Environment}-alb"

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "portalai-${Environment}-api-tg"
      VpcId: !ImportValue
        Fn::Sub: "${Environment}-VpcId"
      Protocol: HTTP
      Port: 3001
      TargetType: ip
      HealthCheckPath: /api/health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Name
          Value: !Sub "portalai-${Environment}-api-tg"

  ALBListenerHTTPS:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Protocol: HTTPS
      Port: 443
      Certificates:
        - CertificateArn: !ImportValue
            Fn::Sub: "${Environment}-CertificateArn"
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  ALBListenerHTTPRedirect:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

  # ── ECS Task Definition ──────────────────────────────────
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "portalai-api-${Environment}"
      Cpu: !Ref Cpu
      Memory: !Ref Memory
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: api
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/portalai-api-${Environment}:${ImageTag}"
          Essential: true
          PortMappings:
            - ContainerPort: 3001
              Protocol: tcp
          HealthCheck:
            Command:
              [
                "CMD-SHELL",
                "curl -f http://localhost:3001/api/health || exit 1",
              ]
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: api
          Environment:
            - Name: PORT
              Value: "3001"
            - Name: NODE_ENV
              Value: production
            - Name: LOG_LEVEL
              Value: info
            - Name: LOG_FORMAT
              Value: json
            - Name: BUILD_VERSION
              Value: !Ref BuildVersion
            - Name: BUILD_SHA
              Value: !Ref BuildSha
            - Name: UPLOAD_S3_BUCKET
              Value: !Ref UploadBucket
            - Name: UPLOAD_S3_REGION
              Value: !Ref AWS::Region
            - Name: UPLOAD_S3_PREFIX
              Value: uploads
            - Name: REDIS_URL
              Value: !Sub
                - "redis://${Endpoint}:${Port}"
                - Endpoint: !ImportValue
                    Fn::Sub: "${Environment}-RedisEndpoint"
                  Port: !ImportValue
                    Fn::Sub: "${Environment}-RedisPort"
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Ref SecretArnDatabaseUrl
            - Name: ENCRYPTION_KEY
              ValueFrom: !Ref SecretArnEncryptionKey
            - Name: AUTH0_WEBHOOK_SECRET
              ValueFrom: !Ref SecretArnAuth0WebhookSecret
            - Name: ANTHROPIC_API_KEY
              ValueFrom: !Ref SecretArnAnthropicApiKey
            - Name: TAVILY_API_KEY
              ValueFrom: !Ref SecretArnTavilyApiKey
            - Name: AUTH0_DOMAIN
              ValueFrom: !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/portalai/${Environment}/auth0-domain"
            - Name: AUTH0_AUDIENCE
              ValueFrom: !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/portalai/${Environment}/auth0-audience"
            - Name: CORS_ORIGIN
              ValueFrom: !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/portalai/${Environment}/cors-origin"
            - Name: NAMESPACE
              ValueFrom: !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/portalai/${Environment}/namespace"
            - Name: SYSTEM_ID
              ValueFrom: !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/portalai/${Environment}/system-id"

  # ── ECS Service ──────────────────────────────────────────
  ECSService:
    Type: AWS::ECS::Service
    DependsOn: ALBListenerHTTPS
    Properties:
      ServiceName: !Sub "portalai-api-${Environment}"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !ImportValue
              Fn::Sub: "${Environment}-PrivateSubnet1"
            - !ImportValue
              Fn::Sub: "${Environment}-PrivateSubnet2"
          SecurityGroups:
            - !Ref ECSSecurityGroup
      LoadBalancers:
        - ContainerName: api
          ContainerPort: 3001
          TargetGroupArn: !Ref TargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      Tags:
        - Key: Name
          Value: !Sub "portalai-api-${Environment}"

  # ── DNS Record ───────────────────────────────────────────
  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "${Subdomain}.${DomainName}"
      Type: A
      AliasTarget:
        HostedZoneId: !GetAtt ALB.CanonicalHostedZoneID
        DNSName: !GetAtt ALB.DNSName

# ── Exports ──────────────────────────────────────────────
Outputs:
  EcrRepositoryUri:
    Value: !GetAtt ECRRepository.RepositoryUri
    Export:
      Name: !Sub "${Environment}-EcrRepositoryUri"

  EcsClusterName:
    Value: !Ref ECSCluster
    Export:
      Name: !Sub "${Environment}-EcsClusterName"

  EcsServiceName:
    Value: !Sub "portalai-api-${Environment}"
    Export:
      Name: !Sub "${Environment}-EcsServiceName"

  EcsSecurityGroupId:
    Value: !Ref ECSSecurityGroup
    Export:
      Name: !Sub "${Environment}-EcsSecurityGroupId"

  AlbDnsName:
    Value: !GetAtt ALB.DNSName

  ApiUrl:
    Value: !Sub "https://${Subdomain}.${DomainName}"
